<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Location Tracker</title>
<style>
body{
font-family:Arial;
text-align:center;
margin-top:50px;
padding:20px;
}

button{
padding:15px 35px;
font-size:18px;
cursor:pointer;
}

#status{
margin-top:20px;
font-size:18px;
}
</style>
</head>

<body>

<h2>Share Location</h2>

<p>Click the button below.</p>

<button onclick="sendLocation()">Share My Location</button>

<div id="status"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBcVls_Ny6HMCcwARt44aDpGNn8VXPF1Gs",
authDomain: "location-tracker-5f75b.firebaseapp.com",
projectId: "location-tracker-5f75b",
storageBucket: "location-tracker-5f75b.firebasestorage.app",
messagingSenderId: "999228849873",
appId: "1:999228849873:web:b7809eab44aeb67d9a4ff0"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

window.sendLocation=function(){

document.getElementById("status").innerHTML="Getting location...";

navigator.geolocation.getCurrentPosition(async(position)=>{

const lat=position.coords.latitude;
const lng=position.coords.longitude;

await addDoc(collection(db,"locations"),{

latitude:lat,
longitude:lng,

googleMap:
`https://maps.google.com/?q=${lat},${lng}`,

time:new Date().toLocaleString(),

userAgent:navigator.userAgent

});

document.getElementById("status").innerHTML="✅ Location Shared Successfully.";

},()=>{

document.getElementById("status").innerHTML="Permission denied.";

},{
enableHighAccuracy:true
});

}

</script>

</body>
</html>
